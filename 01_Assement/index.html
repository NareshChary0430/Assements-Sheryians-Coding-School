<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pikachu Landing Page</title>

  <!-- GOOGLE FONT -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;900&display=swap"
    rel="stylesheet"
  >
  
  <link rel="stylesheet" href="styles.css">

</head>

<body>

  <div class="container">

    <div class="left">

      <img
        class="logo"
        src="https://pngimg.com/d/pokemon_logo_PNG3.png"
        alt=""
      >

      <div class="content">

        <h4 class="sub-heading">
          POKEMON GEN I
        </h4>

        <h1 class="title">
          Pikachu
        </h1>

        <p class="description">
          Pikachu is an Electric-type Pokémon introduced
          in Generation I. Pikachu are small, chubby,
          and incredibly cute mouse-like Pokémon.
          They are almost completely covered by yellow fur.
        </p>


        <div class="counter">

          <div class="line"></div>

          <div class="count-text">
            01 / 08
          </div>

        </div>

      </div>


      <div class="pokeball"></div>

    </div>


    <div class="right">


      <div class="menu">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

    </div>


    <img
      class="pikachu"
      src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/25.svg"
      alt=""
    >

  </div>

</body>
</html>
