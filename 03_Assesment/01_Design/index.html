<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Art Work Cards</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="main-container">

        <div class="top-bar">
            <h2>Explore Art Work</h2>
            <p>See All</p>

                <img src="https://images.unsplash.com/photo-1545239351-1141bd82e8a6?q=80&w=500&auto=format&fit=crop" alt="">
                <div class="card-content">
                    <div class="title-row">
                        <h3>Monocular</h3>
                        <span>54.8k ♡</span>
                    </div>

                    <button>Place Bid</button>
                </div>
            </div>
